<div fxLayout="column">
  <moh-banner [imageUrl]="imageUrl" [mainText]="mainImageText" [mainTextKey]="mainImageTextKey"
              [mainTextParams]="mainImageTextParams"
              [subText]="subImageText" [subTextKey]="subImageTextKey" [subTextParams]="subImageTextParams" [textType]="imageTextType">
    <ng-content></ng-content>
  </moh-banner>
  <div fxLayout="row" fxLayoutAlign="space-between">
    <div fxLayout="column">
      <label class="pageTitle" role="heading" aria-level="3">{{titleUnderImage || (titleUnderImageTextValue | async)}}</label>
    </div>
    <div fxLayout="column" fxLayoutAlign="center center">
      <span class="bold">
        {{date| date: 'dd/MM/yyyy'}}
      </span>
      <span>
        {{hebDate}}
      </span>
    </div>

  </div>
  <div flexLayout="row" *ngIf="showRequiredFieldsMessage" class="requiredMessageDiv">
    <label>{{headerRequiredMessageValue1 | async}}</label>
    <label class="requiredStar"> * </label>
    <label>{{headerRequiredMessageValue2 | async}}</label>
  </div>
</div>
