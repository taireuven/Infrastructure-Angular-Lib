<div  fxLayout="column">
  <div >
      <moh-label-field *ngIf="labelText || textKey" [textKey]="textKey" [text]="labelText" [textParams]="textParams"
        [isRequired]=MarkAsRequired class="flex-item"></moh-label-field>
      <moh-label-field fxFlex fxLayoutAlign="end" fxLayout="row nowrap" *ngIf="capsLockOn" class="capsLock" [textKey]="textKeyCapsLock"
        [text]="labelTextCapsLock"></moh-label-field>
  </div>
  <div>
    <div fxFlex="100">
      <moh-textbox (keydown)="onKeyDown($event)" (blur)="onBlur()" (focus)="onFocus()" [placeholder]="placeholder"
                   [placeholderKey]="placeholderKey"  [maxlength]="maxlength" [formControl]="baseAbstractControl"
                   [type]="passwordType" [isDisabled]="isDisabled"></moh-textbox>
    </div>
    <div fxLayoutAlign="end center">
      <i class="eyeClose" [ngClass]="{'openEye': passwordType == 'text', 'disabledEye': isDisabled}" (click)="toggleInputType()"></i>
    </div>

  </div>
</div>
