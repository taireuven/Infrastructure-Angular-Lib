<div class="moh-v2-input" fxFlex="100">
  <div fxFlex="100">
    <moh-textbox (keydown)="onKeyDown($event)" (blur)="onBlur()" (focus)="onFocus()" [placeholder]="placeholder" [placeholderKey]="placeholderKey"
                 [maxlength]="maxlength" [formControl]="baseAbstractControl" [type]="passwordType"
                 [labelText]="labelText" [textKey]="textKey" [textParams]="textParams" [MarkAsRequired]="MarkAsRequired"
                 [isDisabled]="isDisabled" [markAsInvalid]="markAsInvalid"></moh-textbox>
    <i [ngClass]="[passwordType==='text'?'moh-icon eye_opened':'moh-icon eye_closed', isDisabled ? 'moh-icon  disabled_eye' : '', markAsInvalid? 'moh-icon  invalid_eye' : '']" (click)="toggleInputType()" (keydown.enter)="toggleInputType()" tabindex="0" attr.aria-label="{{showOrHidePasswordTextValue | async}}"></i>
  </div>
</div>
