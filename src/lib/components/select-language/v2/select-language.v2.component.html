<div class="moh-select-language-2" fxLayout=row fxLayoutAlign="end center">
  <i class="moh-icon lang" fxHide.lt-md></i>
  <moh-select role="list" [formControl]="select" ngClass.gt-sm=mohSelect ngClass.lt-md=mohSelectMobile
              displayField="displayName" [useDefaultKey]="false" ariaLabelKey="{{labelTextKey}}"

</div>
