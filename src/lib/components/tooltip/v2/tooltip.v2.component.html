<i #tooltip="matTooltip" role="button"
   matTooltip="{{text || (textValue | async)}}"
   matTooltipPosition="{{location}}"
   [matTooltipClass]="tooltipClass"
   tabindex="0"
   class="moh-tooltip-icon moh-icon help_tooltip"
   aria-hidden="false"></i>
